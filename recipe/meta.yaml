{% set name = "python-picard" %}
{% set version = "0.8.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 42259763f87673837dcc2772cc941139c8ee547093d1b970e95097393c628cde

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - numpy  # for numpy.distutils.core.setup()
  run:
    - python >={{ python_min }}
    - numpy >=1.8
    - matplotlib-base >=1.3
    - numexpr >=2.0
    - scipy >=0.19
    - scikit-learn >=0.23

test:
  requires:
    - python {{ python_min }}
  imports:
    - picard
    - picard.densities
    - picard.solver

about:
  home: https://pierreablin.github.io/picard/
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Preconditioned ICA for Real Data (PICARD) algorithm and its orthogonal version (PICARD-O)
  description: |
    This is a library to run the Preconditioned ICA for Real Data (PICARD)
    algorithm and its orthogonal version (PICARD-O). These algorithms
    show fast convergence even on real data for which sources independence do
    not perfectly hold.
  dev_url: https://github.com/pierreablin/picard

extra:
  recipe-maintainers:
    - hoechenberger
